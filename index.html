.app{
  min-height:100vh;
  background-image:radial-gradient(circle at 15% 15%,#FFE5E5 0%,transparent 45%),
                   radial-gradient(circle at 85% 85%,#E5F0FF 0%,transparent 45%);
  padding:24px 16px 48px;
}

.header{text-align:center;margin-bottom:28px}
.title{font-family:'Fredoka One',cursive;font-size:2.6rem;color:#2D2D2D;letter-spacing:1px}
.title span{color:#FF6B6B}
.subtitle{font-size:.95rem;color:#888;margin-top:4px}

.card{background:white;border-radius:24px;padding:28px 24px;box-shadow:0 8px 32px rgba(0,0,0,.08);max-width:640px;margin:0 auto}

.sec-title{font-family:'Fredoka One',cursive;font-size:1.5rem;color:#2D2D2D;margin-bottom:6px;text-align:center}
.sec-sub{text-align:center;color:#888;font-size:.9rem;margin-bottom:18px;line-height:1.6}
.sec-sub strong{color:#FF6B6B}

textarea{width:100%;min-height:200px;border-radius:16px;border:2px solid #FFD93D;padding:14px;font-family:'Nunito',sans-serif;font-size:1rem;color:#2D2D2D;resize:vertical;outline:none;background:#FFFDF0;line-height:1.8;transition:border-color .2s}
textarea:focus{border-color:#FF9A3C}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;border-radius:50px;border:none;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;transition:transform .15s,box-shadow .15s;letter-spacing:.4px}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.15)}
.btn:active{transform:translateY(0)}
.btn-primary{background:#FF6B6B;color:white}
.btn-secondary{background:#FFD93D;color:#2D2D2D}
.btn-ghost{background:#f0f0f0;color:#555}
.btn-blue{background:#4D96FF;color:white}
.btn-purple{background:#C77DFF;color:white}
.btn-green{background:#6BCB77;color:white}
.btn-sm{padding:8px 16px;font-size:.85rem}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:18px}

/* SAVED LISTS */
.saved-section{margin-bottom:20px}
.saved-title{font-family:'Fredoka One',cursive;font-size:1rem;color:#888;margin-bottom:10px}
.saved-list{display:flex;flex-direction:column;gap:8px}
.saved-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;background:#F8F8FF;border:2px solid #E8E8FF;cursor:pointer;transition:all .2s}
.saved-item:hover{border-color:#C77DFF;background:#F5F0FF}
.saved-item-name{font-weight:800;color:#2D2D2D;flex:1;font-size:.95rem}
.saved-item-count{font-size:.8rem;color:#888}
.saved-item-del{background:none;border:none;cursor:pointer;font-size:1rem;opacity:.4;transition:opacity .2s;padding:4px}
.saved-item-del:hover{opacity:1}

.save-row{display:flex;gap:8px;margin-top:12px}
.save-input{flex:1;padding:10px 14px;border-radius:12px;border:2px solid #ddd;font-family:'Nunito',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.save-input:focus{border-color:#C77DFF}

/* WORD TABLE */
.word-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.word-table th{font-family:'Fredoka One',cursive;font-size:.95rem;padding:10px 14px;text-align:left;color:white}
.word-table th:first-child{background:#4D96FF;border-radius:12px 0 0 12px}
.word-table th:nth-child(2){background:#C77DFF}
.word-table th:last-child{background:#6BCB77;border-radius:0 12px 12px 0;text-align:center}
.word-table td{padding:9px 14px;font-size:.9rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.word-table tr:last-child td{border-bottom:none}
.word-table tr:hover td{background:#fafafa}
.word-badge{font-weight:800}
.progress-dots{display:flex;gap:3px;justify-content:center;flex-wrap:wrap}
.dot{width:10px;height:10px;border-radius:50%;background:#eee;display:inline-block}
.dot.good{background:#6BCB77}
.dot.bad{background:#FF6B6B}

/* MODE PICKER */
.mode-picker{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.mode-card{border:2px solid #eee;border-radius:16px;padding:16px 12px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa}
.mode-card:hover{border-color:#FFD93D;background:#FFFDF0;transform:translateY(-2px)}
.mode-card.selected{border-color:#FF6B6B;background:#FFF0F0}
.mode-icon{font-size:1.8rem;display:block;margin-bottom:6px}
.mode-name{font-family:'Fredoka One',cursive;font-size:.95rem;color:#2D2D2D;margin-bottom:3px}
.mode-desc{font-size:.75rem;color:#888}

.dir-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.dir-btn{padding:8px 16px;border-radius:50px;border:2px solid transparent;font-family:'Fredoka One',cursive;font-size:.85rem;cursor:pointer;transition:all .2s;background:#f0f0f0;color:#777}
.dir-btn.active{background:white;color:#4D96FF;border-color:#4D96FF}

/* PROGRESS BAR */
.prog-wrap{margin-bottom:20px}
.prog-label{text-align:center;font-size:.82rem;color:#999;margin-bottom:6px}
.prog-bar-bg{background:#f0f0f0;border-radius:50px;height:11px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#FF6B6B,#FFD93D);transition:width .4s ease}

/* RONDE BADGE */
.round-badge{display:inline-block;background:#FFF0F0;color:#FF6B6B;border:2px solid #FF6B6B;border-radius:50px;padding:4px 14px;font-family:'Fredoka One',cursive;font-size:.85rem;margin-bottom:14px}

/* FLASHCARD */
.flashcard-wrap{perspective:1200px;width:100%;max-width:420px;margin:0 auto 24px;height:210px;cursor:pointer}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.175,.885,.32,1.275);transform-style:preserve-3d}
.flashcard-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;backface-visibility:hidden;-webkit-backface-visibility:hidden;text-align:center;box-shadow:0 8px 28px rgba(0,0,0,.1)}
.fc-front{color:white}
.fc-back{background:white;transform:rotateY(180deg);border:3px solid currentColor}
.fc-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;opacity:.7;margin-bottom:10px}
.fc-word{font-family:'Fredoka One',cursive;font-size:2rem;line-height:1.2}
.fc-hint-text{margin-top:10px;font-size:.8rem;opacity:.55}
.fc-back-answer{font-size:1.1rem;font-weight:700;line-height:1.5;color:#2D2D2D}

.ans-btns{display:flex;gap:14px;justify-content:center}
.ans-btn{padding:13px 28px;border-radius:50px;border:none;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;transition:transform .15s,box-shadow .15s}
.ans-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.15)}
.ans-btn.yes{background:#6BCB77;color:white}
.ans-btn.no{background:#FF6B6B;color:white}

/* TYPING */
.type-q-box{border-radius:18px;padding:24px;text-align:center;margin-bottom:20px;color:white;box-shadow:0 8px 28px rgba(0,0,0,.1)}
.type-q-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;opacity:.75;margin-bottom:8px}
.type-q-word{font-family:'Fredoka One',cursive;font-size:1.9rem;line-height:1.2}

.type-inp{width:100%;padding:14px 18px;border-radius:13px;border:2px solid #ddd;font-family:'Nunito',sans-serif;font-size:1.05rem;color:#2D2D2D;outline:none;transition:border-color .2s;background:white;margin-bottom:10px}
.type-inp:focus{border-color:#4D96FF}
.type-inp.ok{border-color:#6BCB77;background:#F0FFF4}
.type-inp.bad{border-color:#FF6B6B;background:#FFF0F0}

.hint-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hint-text{font-size:.9rem;color:#888;font-style:italic}
.hint-used{color:#FF9A3C;font-weight:700}

.feedback{border-radius:13px;padding:13px 16px;font-size:.95rem;font-weight:700;margin-bottom:14px;display:none;align-items:flex-start;gap:9px}
.feedback.show{display:flex}
.feedback.ok{background:#F0FFF4;color:#2D8A4E;border:2px solid #6BCB77}
.feedback.bad{background:#FFF0F0;color:#CC3333;border:2px solid #FF6B6B}
.fb-ico{font-size:1.2rem;flex-shrink:0}
.fb-body{line-height:1.5}
.fb-ans{font-weight:800}

/* DICTEE MODE */
.dictee-show-box{border-radius:22px;padding:36px 28px;text-align:center;color:white;box-shadow:0 8px 28px rgba(0,0,0,.15);margin-bottom:24px;position:relative}
.dictee-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;opacity:.75;margin-bottom:10px}
.dictee-word{font-family:'Fredoka One',cursive;font-size:2.4rem;line-height:1.2;transition:opacity .5s,filter .5s}
.dictee-word.vanish{opacity:0;filter:blur(10px);user-select:none}
.countdown-ring{position:relative;width:60px;height:60px;margin:14px auto 0}
.countdown-ring svg{transform:rotate(-90deg)}
.countdown-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.4rem;color:white}
.dictee-inp-phase{animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.dictee-prompt{text-align:center;font-family:'Fredoka One',cursive;font-size:1rem;color:#888;margin-bottom:14px}
.speed-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.speed-btn{padding:6px 14px;border-radius:50px;border:2px solid transparent;font-family:'Fredoka One',cursive;font-size:.8rem;cursor:pointer;transition:all .2s;background:#f0f0f0;color:#777}
.speed-btn.active{background:white;color:#FF9A3C;border-color:#FF9A3C}

/* RESULTS */
.results{text-align:center;padding:12px 0}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Fredoka One',cursive}
.score-num{font-size:2.4rem;line-height:1;color:white}
.score-denom{font-size:.95rem;color:rgba(255,255,255,.8)}
.res-msg{font-family:'Fredoka One',cursive;font-size:1.5rem;color:#2D2D2D;margin-bottom:6px}
.res-sub{color:#777;margin-bottom:20px}
.stars{font-size:1.8rem;margin-bottom:8px}

.mistakes-box{background:#FFF8F8;border-radius:14px;padding:14px 16px;margin-bottom:18px;text-align:left}
.mistakes-title{font-family:'Fredoka One',cursive;font-size:1rem;color:#FF6B6B;margin-bottom:10px}
.mistake-row{display:flex;gap:8px;align-items:baseline;padding:7px 0;border-bottom:1px solid #FFE8E8;font-size:.9rem}
.mistake-row:last-child{border-bottom:none}
.m-word{font-weight:800;color:#2D2D2D;min-width:90px}
.m-meaning{color:#777}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#2D2D2D;color:white;padding:12px 24px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:.95rem;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:transform .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

.error-box{background:#FFF0F0;border:2px solid #FF6B6B;border-radius:14px;padding:14px;color:#CC3333;font-weight:700;text-align:center;margin-top:14px}
.hidden{display:none!important}
.center{text-align:center}
.mt12{margin-top:12px}
.divider{border:none;border-top:2px dashed #f0f0f0;margin:20px 0}

<!-- TOAST -->

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
const COLORS = ["#FF6B6B","#FFD93D","#6BCB77","#4D96FF","#C77DFF","#FF9A3C"];
const $ = id => document.getElementById(id);

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function normalize(s){
  return s.trim().toLowerCase()
    .replace(/[àáâã]/g,'a').replace(/[èéêë]/g,'e')
    .replace(/[ìíîï]/g,'i').replace(/[òóôõ]/g,'o')
    .replace(/[ùúûü]/g,'u');
}

function showStep(name){
  ["scan","list","flash","type","dictee","results"].forEach(s=>
    $("step-"+s).classList.toggle("hidden", s!==name));
  if(name==="type") setTimeout(()=>$("type-inp").focus(),100);
}

let toastTimer;
function toast(msg){
  const el=$("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),2200);
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let state = {
  words:[],        // [{woord,betekenis}]
  progress:{},     // key=woord -> {good:0,bad:0}
  queue:[],
  mistakes:[],
  current:0,
  round:1,
  flipped:false,
  showAnswer:false,
  score:{correct:0,wrong:0},
  practiceMode:"flash",
  direction:"woord",
  hintUsed:false,
  listName:""
};

// ─────────────────────────────────────────────
// OPSLAAN / LADEN (localStorage)
// ─────────────────────────────────────────────
function storageKey(name){ return "woordjes_list_" + name }
function progressKey(name){ return "woordjes_prog_" + name }

function getSavedNames(){
  return Object.keys(localStorage)
    .filter(k=>k.startsWith("woordjes_list_"))
    .map(k=>k.replace("woordjes_list_",""));
}

function renderSavedLists(){
  const names = getSavedNames();
  const section = $("saved-section");
  const list    = $("saved-list");
  list.innerHTML="";
  if(!names.length){ section.classList.add("hidden"); return; }
  section.classList.remove("hidden");
  names.forEach(name=>{
    const data = JSON.parse(localStorage.getItem(storageKey(name))||"[]");
    const row  = document.createElement("div");
    row.className="saved-item";
    row.innerHTML=`<span class="saved-item-name">📚 ${escHtml(name)}</span>
      <span class="saved-item-count">${data.length} woorden</span>
      <button class="saved-item-del" title="Verwijder" onclick="deleteList('${escHtml(name)}',event)">🗑️</button>`;
    row.addEventListener("click", ()=>loadList(name));
    list.appendChild(row);
  });
}

function saveList(){
  const name = $("save-name").value.trim();
  if(!name){ toast("Geef de lijst eerst een naam!"); return; }
  if(!state.words.length){ toast("Er zijn nog geen woordjes om op te slaan."); return; }
  localStorage.setItem(storageKey(name), JSON.stringify(state.words));
  state.listName = name;
  renderSavedLists();
  toast("✅ Lijst '" + name + "' opgeslagen!");
}

function loadList(name){
  const data = JSON.parse(localStorage.getItem(storageKey(name))||"[]");
  if(!data.length) return;
  state.words = data;
  state.listName = name;
  // load progress
  state.progress = JSON.parse(localStorage.getItem(progressKey(name))||"{}");
  $("words-input").value = data.map(w=>w.woord+" - "+w.betekenis).join("\n");
  $("save-name").value = name;
  renderWordList();
  showStep("list");
  toast("📚 Lijst '" + name + "' geladen!");
}

function deleteList(name, e){
  e.stopPropagation();
  localStorage.removeItem(storageKey(name));
  localStorage.removeItem(progressKey(name));
  renderSavedLists();
  toast("🗑️ Lijst verwijderd.");
}

function saveProgress(){
  if(state.listName){
    localStorage.setItem(progressKey(state.listName), JSON.stringify(state.progress));
  }
}

// ─────────────────────────────────────────────
// INVOER
// ─────────────────────────────────────────────
$("btn-load").addEventListener("click",()=>{
  $("error-box").classList.add("hidden");
  const input=$("words-input").value.trim();
  if(!input){ showErr("Vul eerst je woordjes in!"); return; }
  const lines=input.split("\n").map(l=>l.trim()).filter(l=>l);
  const parsed=[];
  for(const line of lines){
    const m=line.match(/^(.+?)\s*[-:=]\s*(.+)$/);
    if(m) parsed.push({woord:m[1].trim(),betekenis:m[2].trim()});
  }
  if(!parsed.length){ showErr("Geen woordjes herkend. Gebruik: woord - betekenis"); return; }
  state.words=parsed;
  // init progress for new words
  parsed.forEach(w=>{ if(!state.progress[w.woord]) state.progress[w.woord]={good:0,bad:0}; });
  renderWordList();
  showStep("list");
});

$("btn-save-list").addEventListener("click", saveList);

function showErr(msg){ $("error-box").textContent="⚠️ "+msg; $("error-box").classList.remove("hidden"); }

// ─────────────────────────────────────────────
// WOORDENLIJST
// ─────────────────────────────────────────────
function renderWordList(){
  $("word-list-title").textContent="📋 "+state.words.length+" woordjes klaar!";
  const tbody=$("word-tbody"); tbody.innerHTML="";
  state.words.forEach((w,i)=>{
    const p = state.progress[w.woord]||{good:0,bad:0};
    const total = p.good+p.bad;
    let dots="";
    if(total===0){
      dots='<span style="color:#ccc;font-size:.8rem">nog niet geoefend</span>';
    } else {
      const last = Math.min(total,8);
      // show last 8 attempts as dots (approximate)
      const goodFrac = p.good/total;
      for(let d=0;d<last;d++) dots+='<span class="dot '+(d/last<goodFrac?'good':'bad')+'"></span>';
    }
    const tr=document.createElement("tr");
    tr.innerHTML=`<td><span class="word-badge" style="color:${COLORS[i%COLORS.length]}">${escHtml(w.woord)}</span></td>
      <td>${escHtml(w.betekenis)}</td>
      <td><div class="progress-dots">${dots}</div></td>`;
    tbody.appendChild(tr);
  });
}

function selectMode(m){
  state.practiceMode=m;
  $("modecard-flash").classList.toggle("selected",m==="flash");
  $("modecard-type").classList.toggle("selected",m==="type");
  $("modecard-dictee").classList.toggle("selected",m==="dictee");
}
function selectDir(d){
  state.direction=d;
  ["dir-woord","dir-betekenis","flash-tab-woord","flash-tab-betekenis","type-tab-woord","type-tab-betekenis"].forEach(id=>{
    const el=$(id); if(!el) return;
    el.classList.toggle("active", id.includes(d==="woord"?"woord":"betekenis") && !id.includes(d==="woord"?"betekenis":"woord"));
  });
}

$("btn-start").addEventListener("click",()=>startPractice());
$("btn-edit").addEventListener("click",()=>showStep("scan"));

// ─────────────────────────────────────────────
// START / RONDE LOGICA
// ─────────────────────────────────────────────
function startPractice(wordsOverride, roundNum){
  const words = wordsOverride || state.words;
  state.queue = [...words].sort(()=>Math.random()-.5);
  state.current=0; state.flipped=false; state.showAnswer=false;
  state.score={correct:0,wrong:0}; state.mistakes=[];
  state.round = roundNum||1;

  if(state.practiceMode==="flash"){
    updateTabHighlight("flash");
    $("flash-round-badge").textContent = "Ronde "+state.round+" — "+state.queue.length+" woorden";
    renderFlashCard();
    showStep("flash");
  } else if(state.practiceMode==="type"){
    updateTabHighlight("type");
    $("type-round-badge").textContent = "Ronde "+state.round+" — "+state.queue.length+" woorden";
    renderTypeCard();
    showStep("type");
  } else {
    updateDicteeTabHighlight();
    $("dictee-round-badge").textContent = "Ronde "+state.round+" — "+state.queue.length+" woorden";
    renderDicteeCard();
    showStep("dictee");
  }
}

function updateTabHighlight(mode){
  const d=state.direction;
  $(mode+"-tab-woord").classList.toggle("active",d==="woord");
  $(mode+"-tab-betekenis").classList.toggle("active",d==="betekenis");
}

function nextOrResults(){
  if(state.current+1 >= state.queue.length){
    showResults();
  } else {
    state.current++;
    state.flipped=false; state.showAnswer=false;
    if(state.practiceMode==="flash") renderFlashCard();
    else renderTypeCard();
  }
}

// ─────────────────────────────────────────────
// FLASHCARD
// ─────────────────────────────────────────────
function renderFlashCard(){
  const {queue,current,direction,flipped,showAnswer}=state;
  const card=queue[current];
  const color=COLORS[current%COLORS.length];
  const q = direction==="woord" ? card.woord : card.betekenis;
  const a = direction==="woord" ? card.betekenis : card.woord;

  $("flash-prog-label").textContent=(current+1)+" van "+queue.length;
  $("flash-prog-fill").style.width=((current/queue.length)*100)+"%";
  $("fc-front").style.background=color;
  $("fc-back").style.borderColor=color;
  $("fc-back").style.color=color;
  $("fc-front-label").textContent=direction==="woord"?"Wat betekent dit woord?":"Welk woord hoort hierbij?";
  $("fc-front-word").textContent=q;
  $("fc-front-hint").textContent=showAnswer?"":"👆 Tik om het antwoord te zien";
  $("fc-back-label").textContent=direction==="woord"?"Betekenis":"Woord";
  $("fc-back-ans").textContent=a;
  $("fc-inner").classList.toggle("flipped",flipped);
  $("fc-wrap").style.cursor=showAnswer?"default":"pointer";
  $("fc-show-wrap").classList.toggle("hidden",showAnswer);
  $("fc-ans-wrap").classList.toggle("hidden",!showAnswer);
}

$("fc-wrap").addEventListener("click",()=>{ if(!state.showAnswer) flipCard(); });
$("btn-fc-show").addEventListener("click", flipCard);
function flipCard(){ state.flipped=true; state.showAnswer=true; renderFlashCard(); }

$("btn-yes").addEventListener("click",()=>handleFlash(true));
$("btn-no").addEventListener("click",()=>handleFlash(false));

function handleFlash(correct){
  const card=state.queue[state.current];
  if(correct){ state.score.correct++; updateProgress(card,true); }
  else { state.score.wrong++; state.mistakes.push(card); updateProgress(card,false); }
  nextOrResults();
}

// ─────────────────────────────────────────────
// TYPEN
// ─────────────────────────────────────────────
function renderTypeCard(){
  const {queue,current,direction}=state;
  const card=queue[current];
  const color=COLORS[current%COLORS.length];
  const q=direction==="woord"?card.woord:card.betekenis;

  $("type-prog-label").textContent=(current+1)+" van "+queue.length;
  $("type-prog-fill").style.width=((current/queue.length)*100)+"%";
  $("type-q-box").style.background=color;
  $("type-q-label").textContent=direction==="woord"?"Wat betekent dit woord?":"Welk woord hoort hierbij?";
  $("type-q-word").textContent=q;

  const inp=$("type-inp");
  inp.value=""; inp.className="type-inp"; inp.disabled=false;
  $("feedback").className="feedback";
  $("btn-check-wrap").classList.remove("hidden");
  $("btn-next-wrap").classList.add("hidden");

  // hint reset
  state.hintUsed=false;
  $("hint-text").textContent="💡 Hint beschikbaar";
  $("hint-text").className="hint-text";
  $("btn-hint").disabled=false;

  setTimeout(()=>inp.focus(),50);
}

$("btn-hint").addEventListener("click",()=>{
  if(state.hintUsed) return;
  const card=state.queue[state.current];
  const answer=state.direction==="woord"?card.betekenis:card.woord;
  const first=answer[0].toUpperCase();
  const rest="_".repeat(Math.max(0,answer.length-1));
  state.hintUsed=true;
  $("hint-text").textContent='💡 Begint met: "'+first+rest+'"';
  $("hint-text").className="hint-text hint-used";
  $("btn-hint").disabled=true;
});

$("type-inp").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if(!$("btn-check-wrap").classList.contains("hidden")) checkAnswer();
    else goNext();
  }
});

$("btn-check").addEventListener("click", checkAnswer);
$("btn-next").addEventListener("click", goNext);

function checkAnswer(){
  const inp=$("type-inp");
  const userRaw=inp.value.trim();
  if(!userRaw) return;
  const card=state.queue[state.current];
  const correct=state.direction==="woord"?card.betekenis:card.woord;
  const isOk=normalize(userRaw)===normalize(correct);

  inp.disabled=true;
  inp.className="type-inp "+(isOk?"ok":"bad");

  const fb=$("feedback"), ico=$("fb-ico"), body=$("fb-body");
  if(isOk){
    fb.className="feedback ok show";
    ico.textContent="✅";
    body.innerHTML="<strong>Helemaal goed!</strong>"+(state.hintUsed?" (hint gebruikt)":"");
    state.score.correct++;
    updateProgress(card,true);
  } else {
    fb.className="feedback bad show";
    ico.textContent="❌";
    body.innerHTML="Het juiste antwoord is:<br><span class='fb-ans'>"+escHtml(correct)+"</span><br>"
      +"<small style='font-weight:400;color:#888'>Jij schreef: "+escHtml(userRaw)+"</small>";
    state.score.wrong++;
    state.mistakes.push(card);
    updateProgress(card,false);
  }

  $("btn-check-wrap").classList.add("hidden");
  $("btn-next-wrap").classList.remove("hidden");
}

function goNext(){ nextOrResults(); }

// ─────────────────────────────────────────────
// VOORTGANG BIJHOUDEN
// ─────────────────────────────────────────────
function updateProgress(card, correct){
  if(!state.progress[card.woord]) state.progress[card.woord]={good:0,bad:0};
  if(correct) state.progress[card.woord].good++;
  else        state.progress[card.woord].bad++;
  saveProgress();
}

// ─────────────────────────────────────────────
// RESULTATEN
// ─────────────────────────────────────────────
function showResults(){
  const {score,queue,mistakes,round}=state;
  const pct=Math.round((score.correct/queue.length)*100);
  let msg,stars,color;
  if(pct===100)    {msg="Perfecte score! 🏆";              stars="⭐⭐⭐";color="#FFD93D"}
  else if(pct>=70) {msg="Super goed gedaan! 🎉";           stars="⭐⭐";  color="#6BCB77"}
  else if(pct>=40) {msg="Goed bezig! Nog even oefenen 💪"; stars="⭐";    color="#FF9A3C"}
  else             {msg="Blijf oefenen, je komt er! 📚";   stars="💪";    color="#4D96FF"}

  $("res-stars").textContent=stars;
  $("res-circle").style.background=color;
  $("res-num").textContent=score.correct;
  $("res-denom").textContent="van "+queue.length;
  $("res-msg").textContent=msg;
  $("res-sub").innerHTML="✅ "+score.correct+" goed &nbsp;|&nbsp; ❌ "+score.wrong+" fout"
    +(round>1?" &nbsp;|&nbsp; 🔄 Ronde "+round:"");

  const mbox=$("mistakes-box"), mlist=$("mistakes-list"), rBtn=$("btn-retry-mistakes");
  if(mistakes.length>0){
    mbox.classList.remove("hidden"); rBtn.style.display="inline-flex";
    mlist.innerHTML="";
    mistakes.forEach(m=>{
      const row=document.createElement("div"); row.className="mistake-row";
      row.innerHTML=`<span class="m-word">${escHtml(m.woord)}</span><span class="m-meaning">→ ${escHtml(m.betekenis)}</span>`;
      mlist.appendChild(row);
    });
  } else {
    mbox.classList.add("hidden"); rBtn.style.display="none";
  }

  renderWordList(); // refresh progress dots
  showStep("results");
}

$("btn-retry").addEventListener("click",()=>startPractice());
$("btn-retry-mistakes").addEventListener("click",()=>{
  const toRetry=[...state.mistakes];
  startPractice(toRetry, state.round+1);
});
$("btn-to-list").addEventListener("click",()=>{ renderWordList(); showStep("list"); });


// ─────────────────────────────────────────────
// DICTEE
// ─────────────────────────────────────────────
state.dicteeSpeed = 3; // seconds visible

function setSpeed(sec){
  state.dicteeSpeed = sec;
  document.querySelectorAll(".speed-btn").forEach(b=>{
    b.classList.toggle("active", parseInt(b.dataset.sec)===sec);
  });
}

function updateDicteeTabHighlight(){
  const d=state.direction;
  $("dictee-tab-woord").classList.toggle("active",d==="woord");
  $("dictee-tab-betekenis").classList.toggle("active",d==="betekenis");
}

let dicteeTimer=null;
let dicteeInterval=null;

function renderDicteeCard(){
  const {queue,current,direction,dicteeSpeed}=state;
  const card=queue[current];
  const color=COLORS[current%COLORS.length];
  const q = direction==="woord" ? card.woord : card.betekenis;
  const lbl = direction==="woord" ? "Lees dit woord goed!" : "Lees deze betekenis goed!";
  const prompt = direction==="woord" ? "Schrijf nu de betekenis op uit je hoofd:" : "Schrijf nu het woord op uit je hoofd:";

  $("dictee-prog-label").textContent=(current+1)+" van "+queue.length;
  $("dictee-prog-fill").style.width=((current/queue.length)*100)+"%";

  // show phase
  $("dictee-show-box").style.background=color;
  $("dictee-show-label").textContent=lbl;
  const wordEl=$("dictee-show-word");
  wordEl.textContent=q;
  wordEl.classList.remove("vanish");

  // reset input phase
  $("dictee-inp-phase").classList.add("hidden");
  $("dictee-prompt").textContent=prompt;
  const inp=$("dictee-inp");
  inp.value=""; inp.className="type-inp"; inp.disabled=false;
  $("dictee-feedback").className="feedback";
  $("dictee-check-wrap").classList.remove("hidden");
  $("dictee-next-wrap").classList.add("hidden");

  // countdown
  const totalMs=state.dicteeSpeed*1000;
  const circumference=163.4;
  const arc=$("countdown-arc");
  const numEl=$("countdown-num");
  arc.style.strokeDashoffset="0";
  numEl.textContent=state.dicteeSpeed;

  clearTimeout(dicteeTimer); clearInterval(dicteeInterval);
  const start=Date.now();
  dicteeInterval=setInterval(()=>{
    const elapsed=Date.now()-start;
    const frac=Math.min(elapsed/totalMs,1);
    arc.style.strokeDashoffset=(circumference*frac).toFixed(2);
    const sLeft=Math.ceil((totalMs-elapsed)/1000);
    numEl.textContent=sLeft>0?sLeft:"";
  },50);

  dicteeTimer=setTimeout(()=>{
    clearInterval(dicteeInterval);
    // fade word out
    wordEl.classList.add("vanish");
    setTimeout(()=>{
      $("dictee-inp-phase").classList.remove("hidden");
      setTimeout(()=>$("dictee-inp").focus(),80);
    },500);
  },totalMs);
}

$("dictee-inp").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if(!$("dictee-check-wrap").classList.contains("hidden")) checkDicteeAnswer();
    else dicteeGoNext();
  }
});
$("btn-dictee-check").addEventListener("click",checkDicteeAnswer);
$("btn-dictee-next").addEventListener("click",dicteeGoNext);

function checkDicteeAnswer(){
  const inp=$("dictee-inp");
  const userRaw=inp.value.trim();
  if(!userRaw) return;
  const card=state.queue[state.current];
  const correct=state.direction==="woord"?card.betekenis:card.woord;
  const isOk=normalize(userRaw)===normalize(correct);

  inp.disabled=true;
  inp.className="type-inp "+(isOk?"ok":"bad");

  const fb=$("dictee-feedback"),ico=$("dictee-fb-ico"),body=$("dictee-fb-body");
  if(isOk){
    fb.className="feedback ok show";
    ico.textContent="✅";
    body.innerHTML="<strong>Uitstekend!</strong> Je hebt het goed onthouden!";
    state.score.correct++;
    updateProgress(card,true);
  } else {
    fb.className="feedback bad show";
    ico.textContent="❌";
    body.innerHTML="Het juiste antwoord was:<br><span class='fb-ans'>"+escHtml(correct)+"</span><br>"
      +"<small style='font-weight:400;color:#888'>Jij schreef: "+escHtml(userRaw)+"</small>";
    state.score.wrong++;
    state.mistakes.push(card);
    updateProgress(card,false);
  }
  $("dictee-check-wrap").classList.add("hidden");
  $("dictee-next-wrap").classList.remove("hidden");
}

function dicteeGoNext(){
  clearTimeout(dicteeTimer); clearInterval(dicteeInterval);
  nextOrResults();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderSavedLists();
selectDir("woord");
</script>

</body>
