<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woordjes Leren</title>

<style>
body{font-family:sans-serif;background:#FFF9F0;margin:0}
.app{max-width:700px;margin:auto;padding:20px}
.card{background:white;border-radius:16px;padding:20px;margin-bottom:20px}
.hidden{display:none}
button{padding:10px 20px;border:none;border-radius:10px;cursor:pointer}
.primary{background:#FF6B6B;color:white}
.secondary{background:#4D96FF;color:white}
</style>
</head>

<body>
<div class="app">

<div id="input" class="card">
<h2>📝 Woordjes</h2>
<textarea id="words" rows="8" style="width:100%"></textarea>
<br><br>
<button id="load" class="primary">Start</button>
</div>

<div id="quiz" class="card hidden">
<h2 id="question"></h2>
<input id="answer" placeholder="Typ antwoord..." style="width:100%;padding:10px">
<br><br>
<button id="check" class="primary">Check</button>
<button id="next" class="secondary hidden">Volgende</button>
<p id="feedback"></p>
</div>

<div id="result" class="card hidden">
<h2>Resultaat</h2>
<p id="score"></p>
<button onclick="App.restart()">Opnieuw</button>
</div>

</div>

<script>
// ==========================
// STATE
// ==========================
const State = {
  words: [],
  queue: [],
  current: 0,
  score: 0
};

// ==========================
// HELPERS
// ==========================
const $ = id => document.getElementById(id);

function normalize(s){
  return s.toLowerCase().trim();
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ==========================
// UI
// ==========================
const UI = {
  show(screen){
    ["input","quiz","result"].forEach(id=>{
      $(id).classList.toggle("hidden", id !== screen);
    });
  },

  setQuestion(q){
    $("question").textContent = q;
    $("answer").value = "";
    $("feedback").textContent = "";
    $("next").classList.add("hidden");
  },

  showFeedback(msg){
    $("feedback").textContent = msg;
    $("next").classList.remove("hidden");
  },

  showScore(){
    $("score").textContent = `${State.score} / ${State.queue.length}`;
  }
};

// ==========================
// LOGIC
// ==========================
const Logic = {

  parseInput(text){
    return text.split("\n")
      .map(l => l.split("-"))
      .filter(p => p.length === 2)
      .map(p => ({
        woord: p[0].trim(),
        betekenis: p[1].trim()
      }));
  },

  start(){
    const input = $("words").value;
    const parsed = this.parseInput(input);

    if(!parsed.length){
      alert("Gebruik: woord - betekenis");
      return;
    }

    State.words = parsed;
    State.queue = shuffle([...parsed]);
    State.current = 0;
    State.score = 0;

    UI.show("quiz");
    this.next();
  },

  next(){
    if(State.current >= State.queue.length){
      UI.show("result");
      UI.showScore();
      return;
    }

    const card = State.queue[State.current];
    UI.setQuestion(card.woord);
  },

  check(){
    const card = State.queue[State.current];
    const user = normalize($("answer").value);
    const correct = normalize(card.betekenis);

    if(user === correct){
      State.score++;
      UI.showFeedback("✅ Goed!");
    } else {
      UI.showFeedback(`❌ Fout! Antwoord: ${card.betekenis}`);
    }
  },

  nextStep(){
    State.current++;
    this.next();
  }
};

// ==========================
// EVENTS
// ==========================
const Events = {
  bind(){
    $("load").onclick = () => Logic.start();
    $("check").onclick = () => Logic.check();
    $("next").onclick = () => Logic.nextStep();

    $("answer").addEventListener("keydown", e=>{
      if(e.key === "Enter"){
        if($("next").classList.contains("hidden")) Logic.check();
        else Logic.nextStep();
      }
    });
  }
};

// ==========================
// APP
// ==========================
const App = {
  init(){
    Events.bind();
  },
  restart(){
    UI.show("input");
  }
};

App.init();
</script>
</body>
</html>
